<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JDExchange - Buy & Sell Crypto in Ghana</title>
    <meta name="description" content="Ghana's trusted cryptocurrency exchange. Buy, sell, and trade Bitcoin, Ethereum, USDT with Ghana Cedis via Mobile Money and bank transfer." />
    <!-- Preconnect & load Google Fonts non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" /></noscript>
    <!-- Prevent theme flash: set dark class + body bg synchronously before first paint -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#020617';
          document.documentElement.style.color = '#f8fafc';
        } else {
          document.documentElement.style.backgroundColor = '#f8fafc';
          document.documentElement.style.color = '#0f172a';
        }
      })();
    </script>
    <style>
      /* Match theme bg immediately — prevents white flash */
      html, body { margin: 0; transition: none; }
      body { background: inherit; color: inherit; }
      /* Hide root until React hydrates, then fade in */
      #root { opacity: 0; }
      #root.ready { animation: fadeInRoot 0.25s ease-out forwards; }
      @keyframes fadeInRoot { to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
